name: Release
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            goos: darwin
            binary_name: agent_macos
          - platform: ubuntu-22.04
            goos: linux
            binary_name: agent_linux_amd64
          - platform: windows-latest
            goos: windows
            binary_name: agent.exe
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            pkg-config \
            build-essential \
            curl \
            wget \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          work-dir: src-tauri

      - name: Go setup
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: gr_agent/go.sum

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Agent
        shell: bash
        run: |
          cd gr_agent
          GOOS=${{ matrix.goos }} GOARCH=amd64 go build -o ${{ matrix.binary_name }} main.go || true
          cd ..

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Ter ${{ github.ref_name }} - Cyber Edition"
          releaseBody: "Desktop Release (Windows, Linux, macOS)"
          releaseDraft: false
          prerelease: false

  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and Build Tools
        run: |
          sdkmanager "ndk;25.2.9519653" "build-tools;34.0.0"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "${ANDROID_SDK_ROOT}/ndk/25.2.9519653/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH
          echo "ANDROID_BUILD_TOOLS=${ANDROID_SDK_ROOT}/build-tools/34.0.0" >> $GITHUB_ENV

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          work-dir: src-tauri

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: npm run tauri android build -- --apk

      - name: Collect APKs
        run: |
          mkdir -p build-artifacts
          find src-tauri/gen/android -name "*.apk" -exec cp {} build-artifacts/ \;
          ls -R build-artifacts

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: build-artifacts
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
